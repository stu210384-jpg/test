<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>攝影鏡頭表單</title>
</head>

<body style="text-align:center;font-family:sans-serif;">

<h2>📸 攝影鏡頭</h2>

<video id="video" autoplay playsinline style="width:90%;max-width:400px;background:black;"></video>
<br>

<button onclick="startCamera()">開啟鏡頭</button>
<button onclick="switchCamera()">切換鏡頭</button>
<button onclick="takePhoto()">拍照</button>

<br>
<canvas id="canvas" style="width:90%;max-width:400px;"></canvas>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let context = canvas.getContext('2d');

let currentFacing = "environment"; // 後鏡頭
let stream = null;

// 開啟攝影機
async function startCamera() {
  try {
    // 停止舊的鏡頭
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }

    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: currentFacing
      },
      audio: false
    });

    video.srcObject = stream;

    // 🔥 強制播放（解決黑畫面）
    video.onloadedmetadata = () => {
      video.play();
    };

  } catch (err) {
    alert("❌ 攝影機錯誤：\n" + err.name + "\n" + err.message);
  }
}

// 切換前後鏡頭
function switchCamera() {
  currentFacing = (currentFacing === "environment") ? "user" : "environment";
  startCamera();
}

// 拍照
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  context.drawImage(video, 0, 0);
}

// 🔥 自動啟動（部分裝置需要使用者點擊才會成功）
window.onload = () => {
  console.log("頁面載入完成");
};
</script>

</body>
</html>
