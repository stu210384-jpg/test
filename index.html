<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>攝影鏡頭表單</title>
</head>

<body style="text-align:center;font-family:sans-serif;">

<h2>📸 攝影鏡頭 + QR掃描</h2>

<video id="video" autoplay playsinline muted
style="width:90%;max-width:400px;background:black;"></video>
<br>

<button onclick="startCamera()">開啟鏡頭</button>
<button onclick="switchCamera()">切換鏡頭</button>
<button onclick="takePhoto()">拍照</button>

<br><br>

<button onclick="startScan()">開始掃描QR</button>
<button onclick="stopScan()">停止掃描</button>

<p id="result" style="color:blue;font-weight:bold;"></p>

<br>
<canvas id="canvas" style="width:90%;max-width:400px;"></canvas>

<!-- 🔥 QR掃描套件 -->
<script src="https://cdn.jsdelivr.net/npm/jsqr"></script>

<script>
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let context = canvas.getContext('2d');
let result = document.getElementById('result');

let currentFacing = "environment";
let stream = null;
let scanning = false;

// 開啟攝影機
async function startCamera() {
  try {
    if (stream) {
      stream.getTracks().forEach(track => track.stop());
    }

    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: currentFacing },
        audio: false
      });
    } catch (e) {
      // fallback（桌機）
      stream = await navigator.mediaDevices.getUserMedia({
        video: true,
        audio: false
      });
    }

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
    };

  } catch (err) {
    alert("❌ 攝影機錯誤：\n" + err.name + "\n" + err.message);
  }
}

// 切換鏡頭
function switchCamera() {
  currentFacing = (currentFacing === "environment") ? "user" : "environment";
  startCamera();
}

// 拍照
function takePhoto() {
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  context.drawImage(video, 0, 0);
}

// 🔍 開始掃描
function startScan() {
  scanning = true;
  scanLoop();
}

// ⛔ 停止掃描
function stopScan() {
  scanning = false;
}

// 🔄 掃描迴圈
function scanLoop() {
  if (!scanning) return;

  if (video.readyState === video.HAVE_ENOUGH_DATA) {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    context.drawImage(video, 0, 0);

    let imageData = context.getImageData(0, 0, canvas.width, canvas.height);
    let code = jsQR(imageData.data, canvas.width, canvas.height);

    if (code) {
      result.innerText = "✅ QR內容：\n" + code.data;
      scanning = false;
      return;
    }
  }

  requestAnimationFrame(scanLoop);
}
</script>

</body>
</html>
